<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Research Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #080910;
  --bg2:       #0d0f14;
  --bg3:       #12141b;
  --bg4:       #181b24;
  --bg5:       #1e2130;

  --gold:      #f5c842;
  --gold-dim:  #c9a030;
  --gold-glow: rgba(245,200,66,0.15);
  --gold-bg:   rgba(245,200,66,0.06);
  --gold-bd:   rgba(245,200,66,0.22);

  --purple:      #a78bfa;
  --purple-dim:  #7c5fc7;
  --purple-glow: rgba(167,139,250,0.15);
  --purple-bg:   rgba(167,139,250,0.07);
  --purple-bd:   rgba(167,139,250,0.25);

  --pursue:    #34d399;
  --pursue-bg: rgba(52,211,153,0.08);
  --pursue-bd: rgba(52,211,153,0.25);
  --nogo:      #f87171;
  --nogo-bg:   rgba(248,113,113,0.08);
  --nogo-bd:   rgba(248,113,113,0.25);

  --text:   #e2e0f0;
  --text2:  #9896b0;
  --text3:  #4e4c65;
  --border: rgba(255,255,255,0.055);
  --border2:rgba(255,255,255,0.1);
  --border3:rgba(255,255,255,0.16);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Space Grotesk', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── BACKGROUND ATMOSPHERE ── */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 60% 40% at 15% 0%, rgba(167,139,250,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 50% 35% at 85% 100%, rgba(245,200,66,0.05) 0%, transparent 55%),
    radial-gradient(ellipse 30% 25% at 50% 50%, rgba(167,139,250,0.03) 0%, transparent 60%);
}

/* ── SCANLINE TEXTURE ── */
body::after {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.08) 2px,
    rgba(0,0,0,0.08) 4px
  );
  opacity: 0.4;
}

/* ── NAV ── */
.topnav {
  position: sticky; top: 0; z-index: 300;
  display: flex; align-items: center; justify-content: space-between;
  height: 56px; padding: 0 28px;
  background: rgba(8,9,16,0.85);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}
.topnav::after {
  content: '';
  position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--purple-dim), var(--gold-dim), transparent);
  opacity: 0.5;
}
.nav-logo {
  font-family: 'Space Mono', monospace;
  font-size: 14px; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase;
  display: flex; align-items: center; gap: 10px;
}
.nav-logo-icon {
  width: 28px; height: 28px; border-radius: 6px;
  background: linear-gradient(135deg, var(--purple-dim), var(--gold-dim));
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; color: #080910;
  position: relative;
}
.nav-logo-icon::after {
  content: '';
  position: absolute; inset: -1px; border-radius: 7px;
  background: linear-gradient(135deg, var(--purple), var(--gold));
  z-index: -1; opacity: 0.6;
}
.nav-logo-text { color: var(--text); }
.nav-logo-text em { color: var(--gold); font-style: normal; }
.nav-right { display: flex; align-items: center; gap: 16px; }
.nav-badge {
  font-family: 'Space Mono', monospace; font-size: 10px;
  color: var(--text3); letter-spacing: 0.08em;
  padding: 3px 10px; border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--bg3);
}
.nav-pulse {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--pursue);
  box-shadow: 0 0 6px var(--pursue);
  animation: pulse-dot 2.5s ease-in-out infinite;
}
@keyframes pulse-dot {
  0%,100% { opacity: 1; box-shadow: 0 0 6px var(--pursue); }
  50%      { opacity: 0.4; box-shadow: 0 0 12px var(--pursue); }
}

/* ── LAYOUT ── */
.layout {
  display: grid;
  grid-template-columns: 272px 1fr;
  height: calc(100vh - 56px);
  position: relative; z-index: 1;
}

/* ── SIDEBAR ── */
.sidebar {
  border-right: 1px solid var(--border);
  background: linear-gradient(180deg, var(--bg2) 0%, var(--bg) 100%);
  overflow-y: auto; padding: 16px 12px;
  display: flex; flex-direction: column; gap: 4px;
  position: relative;
}
.sidebar::before {
  content: '';
  position: absolute; top: 0; right: 0; width: 1px; height: 100%;
  background: linear-gradient(180deg, var(--purple-dim), transparent 40%, var(--gold-dim) 100%);
  opacity: 0.35;
}
.sidebar-label {
  font-family: 'Space Mono', monospace;
  font-size: 9px; letter-spacing: 0.14em; color: var(--text3);
  padding: 6px 10px 12px; text-transform: uppercase;
  display: flex; align-items: center; gap: 8px;
}
.sidebar-label::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(90deg, var(--border2), transparent);
}

.biz-card {
  padding: 12px 13px; border-radius: 10px;
  border: 1px solid transparent; cursor: pointer;
  transition: all 0.2s ease; background: transparent;
  position: relative; overflow: hidden;
}
.biz-card::before {
  content: '';
  position: absolute; inset: 0; border-radius: 10px;
  background: linear-gradient(135deg, var(--purple-bg), transparent);
  opacity: 0; transition: opacity 0.2s;
}
.biz-card:hover { background: var(--bg3); border-color: var(--border2); }
.biz-card:hover::before { opacity: 1; }
.biz-card.active {
  background: var(--bg4);
  border-color: var(--purple-bd);
  box-shadow: 0 0 0 1px var(--purple-bg) inset, 0 4px 20px rgba(0,0,0,0.4);
}
.biz-card.active::before { opacity: 1; }

.biz-card-name {
  font-size: 12px; font-weight: 600; color: var(--text);
  line-height: 1.4; margin-bottom: 8px;
  letter-spacing: 0.01em;
}
.biz-card-row { display: flex; align-items: center; justify-content: space-between; gap: 6px; }
.biz-date {
  font-family: 'Space Mono', monospace;
  font-size: 9px; color: var(--text3); letter-spacing: 0.06em;
}
.verdict-badge {
  font-family: 'Space Mono', monospace; font-size: 8px; font-weight: 700;
  letter-spacing: 0.1em; padding: 2px 8px; border-radius: 20px;
  text-transform: uppercase; white-space: nowrap;
}
.verdict-pursue {
  background: var(--pursue-bg); color: var(--pursue);
  border: 1px solid var(--pursue-bd);
}
.verdict-nogo {
  background: var(--nogo-bg); color: var(--nogo);
  border: 1px solid var(--nogo-bd);
}
.progress-bar {
  margin-top: 9px; height: 2px;
  background: var(--border); border-radius: 2px; overflow: hidden;
  position: relative;
}
.progress-fill {
  height: 100%; border-radius: 2px;
  background: linear-gradient(90deg, var(--purple-dim), var(--gold));
  transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
  position: relative;
}
.progress-fill::after {
  content: '';
  position: absolute; right: 0; top: -1px; width: 4px; height: 4px;
  border-radius: 50%; background: var(--gold);
  box-shadow: 0 0 6px var(--gold);
}
.progress-fill.nogo {
  background: linear-gradient(90deg, var(--nogo-bd), var(--nogo));
}
.progress-fill.nogo::after { background: var(--nogo); box-shadow: 0 0 6px var(--nogo); }

/* ── MAIN ── */
.main { overflow-y: auto; display: flex; flex-direction: column; background: var(--bg); }
.main-empty {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  color: var(--text3); gap: 12px;
}
.main-empty-ring {
  width: 56px; height: 56px; border-radius: 50%;
  border: 1px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  position: relative;
}
.main-empty-ring::before {
  content: '';
  position: absolute; inset: -4px; border-radius: 50%;
  border: 1px solid transparent;
  border-top-color: var(--purple-dim);
  animation: spin 3s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.main-empty-ring::after {
  content: '';
  position: absolute; inset: -8px; border-radius: 50%;
  border: 1px solid transparent;
  border-bottom-color: var(--gold-dim);
  animation: spin 5s linear infinite reverse;
}
.main-empty-text {
  font-family: 'Space Mono', monospace;
  font-size: 11px; letter-spacing: 0.1em; color: var(--text3);
}

/* ── BIZ HEADER ── */
.biz-header {
  padding: 28px 32px 0;
  background: linear-gradient(180deg, var(--bg2) 0%, var(--bg) 100%);
  position: relative;
}
.biz-header::after {
  content: '';
  position: absolute; bottom: 0; left: 32px; right: 32px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--purple-bd), var(--gold-bd), transparent);
  opacity: 0;
}
.biz-header-top {
  display: flex; align-items: flex-start;
  justify-content: space-between; gap: 16px; margin-bottom: 12px;
}
.biz-title {
  font-size: 22px; font-weight: 700; line-height: 1.2;
  letter-spacing: -0.01em;
  background: linear-gradient(135deg, var(--text) 60%, var(--purple));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.biz-meta-row {
  display: flex; align-items: center; gap: 24px;
  flex-wrap: wrap; margin-bottom: 16px;
}
.biz-meta-item { display: flex; align-items: center; gap: 8px; }
.biz-meta-label {
  font-family: 'Space Mono', monospace; font-size: 9px;
  color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase;
}
.biz-meta-value {
  font-family: 'Space Mono', monospace; font-size: 11px; color: var(--text2);
}
.biz-notes {
  font-size: 12px; color: var(--text2); line-height: 1.7;
  padding: 12px 16px; border-radius: 8px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-left: 2px solid var(--gold-dim);
  margin-bottom: 24px;
  position: relative; overflow: hidden;
}
.biz-notes::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, var(--gold-dim), transparent);
  opacity: 0.5;
}

/* ── STATS ── */
.stats-row {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 1px; background: var(--border);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}
.stat-cell {
  padding: 18px 24px; background: var(--bg); text-align: center;
  position: relative; overflow: hidden; transition: background 0.2s;
}
.stat-cell:hover { background: var(--bg2); }
.stat-cell::before {
  content: '';
  position: absolute; top: 0; left: 50%; transform: translateX(-50%);
  width: 40%; height: 1px;
  background: linear-gradient(90deg, transparent, var(--purple-dim), transparent);
  opacity: 0.6;
}
.stat-num {
  font-family: 'Space Mono', monospace; font-weight: 700;
  font-size: 30px; line-height: 1; margin-bottom: 4px;
  background: linear-gradient(135deg, var(--text), var(--purple));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.stat-label {
  font-family: 'Space Mono', monospace; font-size: 9px;
  color: var(--text3); letter-spacing: 0.12em; text-transform: uppercase;
}

/* ── PHASE TABS ── */
.phase-tabs-wrap {
  border-bottom: 1px solid var(--border);
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  background: rgba(8,9,16,0.7);
  backdrop-filter: blur(12px);
  position: sticky; top: 56px; z-index: 100;
}
.phase-tabs-wrap::-webkit-scrollbar { display: none; }
.phase-tabs {
  display: flex; align-items: stretch;
  padding: 0 32px; min-width: max-content;
}

.phase-tab {
  font-family: 'Space Mono', monospace; font-size: 9px;
  letter-spacing: 0.1em; text-transform: uppercase;
  padding: 14px 18px; cursor: pointer;
  border-bottom: 2px solid transparent;
  color: var(--text3); transition: all 0.18s ease;
  white-space: nowrap; user-select: none;
  display: flex; flex-direction: column; align-items: center; gap: 5px;
  position: relative;
}
.phase-tab:hover:not(.disabled) { color: var(--text2); background: var(--bg2); }
.phase-tab.active {
  color: var(--gold);
  border-bottom-color: var(--gold);
}
.phase-tab.active::before {
  content: '';
  position: absolute; bottom: -1px; left: 50%;
  transform: translateX(-50%);
  width: 30px; height: 4px;
  background: var(--gold);
  filter: blur(6px);
  border-radius: 2px;
}
.phase-tab.disabled { opacity: 0.22; cursor: not-allowed; }

.phase-tab.sales-tab {
  margin: 0 6px;
  border-left: 1px solid var(--border);
  border-right: 1px solid var(--border);
  padding-left: 20px; padding-right: 20px;
}
.phase-tab.sales-tab.active {
  color: var(--purple);
  border-bottom-color: var(--purple);
}
.phase-tab.sales-tab.active::before {
  background: var(--purple); filter: blur(6px);
}

.tab-count {
  font-size: 8px; border-radius: 10px;
  padding: 1px 7px; min-width: 26px; text-align: center;
  background: var(--bg4); color: var(--text3);
  border: 1px solid var(--border); transition: all 0.18s;
}
.phase-tab.active .tab-count {
  background: var(--gold-bg); color: var(--gold);
  border-color: var(--gold-bd);
}
.phase-tab.sales-tab.active .tab-count {
  background: var(--purple-bg); color: var(--purple);
  border-color: var(--purple-bd);
}

/* ── PHASE CONTENT ── */
.phase-content { padding: 28px 32px; flex: 1; }
.phase-header { margin-bottom: 22px; }
.phase-title-row { display: flex; align-items: center; gap: 12px; margin-bottom: 5px; }
.phase-title {
  font-size: 16px; font-weight: 600; letter-spacing: -0.01em;
}
.phase-title-line {
  flex: 1; height: 1px;
  background: linear-gradient(90deg, var(--border2), transparent);
}
.phase-subtitle {
  font-family: 'Space Mono', monospace;
  font-size: 10px; color: var(--text3); letter-spacing: 0.06em;
}
.phase-subtitle.gold { color: var(--gold-dim); }
.phase-subtitle.sales { color: var(--purple-dim); }

/* ── REPORT ROWS ── */
.reports-list { display: flex; flex-direction: column; gap: 8px; }

.report-row {
  display: flex; align-items: center; gap: 14px;
  padding: 15px 18px; border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--bg2);
  transition: all 0.18s ease;
  text-decoration: none; color: inherit;
  position: relative; overflow: hidden;
}
.report-row::before {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0; width: 2px;
  background: linear-gradient(180deg, var(--purple), var(--gold));
  opacity: 0; transition: opacity 0.18s;
}
.report-row.has-file { border-color: var(--border2); background: var(--bg3); }
.report-row.has-file:hover {
  background: var(--bg4);
  border-color: var(--border3);
  transform: translateX(2px);
  box-shadow: 0 4px 24px rgba(0,0,0,0.4), 0 0 0 1px var(--border2);
}
.report-row.has-file:hover::before { opacity: 1; }
.report-row.no-file { opacity: 0.3; }

.report-row.sales-row.has-file:hover::before {
  background: linear-gradient(180deg, var(--purple), var(--purple-dim));
}

.report-num {
  font-family: 'Space Mono', monospace; font-size: 10px;
  color: var(--text3); width: 20px; flex-shrink: 0; letter-spacing: 0.04em;
}
.report-status {
  width: 22px; height: 22px; border-radius: 50%;
  border: 1px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; font-size: 10px; transition: all 0.18s;
  background: var(--bg5);
}
.report-status.done {
  background: var(--pursue-bg); border-color: var(--pursue-bd);
  color: var(--pursue); box-shadow: 0 0 8px var(--pursue-bg);
}
.report-status.sales-done {
  background: var(--purple-bg); border-color: var(--purple-bd);
  color: var(--purple); box-shadow: 0 0 8px var(--purple-bg);
}

.report-info { flex: 1; min-width: 0; }
.report-name {
  font-size: 13px; font-weight: 600; letter-spacing: 0.005em;
  margin-bottom: 3px;
}
.report-desc {
  font-family: 'Space Mono', monospace;
  font-size: 9px; color: var(--text3);
  line-height: 1.5; letter-spacing: 0.03em;
}

.report-file {
  font-family: 'Space Mono', monospace; font-size: 9px;
  color: var(--text3); white-space: nowrap; flex-shrink: 0;
}

.open-btn {
  font-family: 'Space Mono', monospace; font-size: 9px; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--gold); padding: 6px 14px;
  border: 1px solid var(--gold-bd); border-radius: 6px;
  white-space: nowrap; flex-shrink: 0;
  background: var(--gold-bg);
  transition: all 0.15s;
  position: relative; overflow: hidden;
}
.open-btn::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent, rgba(245,200,66,0.1), transparent);
  transform: translateX(-100%); transition: transform 0.4s;
}
.open-btn:hover { background: rgba(245,200,66,0.12); box-shadow: 0 0 12px var(--gold-glow); }
.open-btn:hover::before { transform: translateX(100%); }

.open-btn.sales {
  color: var(--purple); border-color: var(--purple-bd);
  background: var(--purple-bg);
}
.open-btn.sales::before {
  background: linear-gradient(90deg, transparent, rgba(167,139,250,0.1), transparent);
}
.open-btn.sales:hover { background: rgba(167,139,250,0.12); box-shadow: 0 0 12px var(--purple-glow); }

.not-run-label {
  font-family: 'Space Mono', monospace; font-size: 9px;
  color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg5); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--border2); }

/* ── ENTER ANIMATION ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
.report-row { animation: fadeUp 0.25s ease both; }
.report-row:nth-child(1) { animation-delay: 0.02s; }
.report-row:nth-child(2) { animation-delay: 0.06s; }
.report-row:nth-child(3) { animation-delay: 0.10s; }
.report-row:nth-child(4) { animation-delay: 0.14s; }
.report-row:nth-child(5) { animation-delay: 0.18s; }
.report-row:nth-child(6) { animation-delay: 0.22s; }
.report-row:nth-child(7) { animation-delay: 0.26s; }

/* ── MOBILE ── */
@media (max-width: 700px) {
  .layout { grid-template-columns: 1fr; grid-template-rows: auto 1fr; height: auto; min-height: calc(100vh - 56px); }
  .sidebar {
    border-right: none; border-bottom: 1px solid var(--border);
    max-height: 210px; flex-direction: row;
    flex-wrap: nowrap; overflow-x: auto; overflow-y: hidden;
    gap: 6px; padding: 8px 6px;
  }
  .sidebar-label { display: none; }
  .biz-card { min-width: 160px; flex-shrink: 0; }
  .biz-header { padding: 18px 18px 0; }
  .biz-title { font-size: 18px; }
  .phase-tabs { padding: 0 18px; }
  .phase-content { padding: 18px; }
  .report-row { padding: 12px 14px; }
  .report-file { display: none; }
  .biz-header-top { flex-direction: column; gap: 8px; }
  .stat-num { font-size: 24px; }
  .stat-cell { padding: 14px 10px; }
}
</style>
</head>
<body>

<nav class="topnav">
  <div class="nav-logo">
    <div class="nav-logo-icon">R</div>
    <div class="nav-logo-text">Research<em>Hub</em></div>
  </div>
  <div class="nav-right">
    <div class="nav-badge" id="nav-meta">Initializing...</div>
    <div class="nav-pulse"></div>
  </div>
</nav>

<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main" id="main">
    <div class="main-empty">
      <div class="main-empty-ring">◎</div>
      <div class="main-empty-text">Select a business</div>
    </div>
  </main>
</div>

<script>
// ─────────────────────────────────────────────────────────────
// ADD NEW BUSINESS FOLDER NAMES HERE
// ─────────────────────────────────────────────────────────────
const BUSINESSES = [
  'fire-pump-flow-testing',
  'aerial-lift-inspection',
  'backflow-prevention-testing',
];

const TABS = [
  {
    id: 'research', label: 'Research', sublabel: null, isSales: false,
    reports: [
      { key: 'research', name: 'Business Research Report', desc: 'Market overview · pricing · licensing · Go/No-Go verdict' },
    ]
  },
  {
    id: 'phase2', label: 'Phase 2', sublabel: 'Intelligence', isSales: false,

let businesses = [], selectedId = null, activeTab = 'research';

async function loadAll() {
  const results = await Promise.all(
    BUSINESSES.map(id =>
      fetch(`businesses/${id}/meta.json`)
        .then(r => r.json()).then(data => ({ id, ...data })).catch(() => null)
    )
  );
  businesses = results.filter(Boolean).sort((a, b) => new Date(b.date) - new Date(a.date));
  const pursuing = businesses.filter(b => b.verdict === 'pursue').length;
  document.getElementById('nav-meta').textContent =
    `${businesses.length} businesses · ${pursuing} pursuing`;
  renderSidebar();
  if (businesses.length) selectBusiness(businesses[0].id);
}

function countFiles(b) { return Object.values(b.files||{}).filter(Boolean).length; }
function countTotal(b) { return Object.keys(b.files||{}).length; }
function tabDoneCount(b, tab) { return tab.reports.filter(r => b.files&&b.files[r.key]).length; }
function tabHasAny(b, tab) { return tab.reports.some(r => b.files&&b.files[r.key]); }
function formatDate(iso) {
  return new Date(iso+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}

function renderSidebar() {
  document.getElementById('sidebar').innerHTML =
    `<div class="sidebar-label">Businesses</div>` +
    businesses.map(b => {
      const done = countFiles(b), total = countTotal(b);
      const pct = total > 0 ? Math.round(done/total*100) : 0;
      return `
        <div class="biz-card ${selectedId===b.id?'active':''}" onclick="selectBusiness('${b.id}')">
          <div class="biz-card-name">${b.name}</div>
          <div class="biz-card-row">
            <div class="biz-date">${formatDate(b.date)}</div>
            <div class="verdict-badge verdict-${b.verdict}">${b.verdict==='pursue'?'▲ Pursue':'✕ No-Go'}</div>
          </div>
          <div class="progress-bar">
            <div class="progress-fill ${b.verdict==='nogo'?'nogo':''}" style="width:${pct}%"></div>
          </div>
        </div>`;
    }).join('');
}

function selectBusiness(id) {
  selectedId = id; activeTab = 'research';
  renderSidebar(); renderMain();
}

function selectTab(tabId) {
  const b = businesses.find(x => x.id===selectedId);
  const tab = TABS.find(t => t.id===tabId);
  if (!b || !tab || !tabHasAny(b,tab)) return;
  activeTab = tabId;
  renderTabs(b); renderPhaseContent(b);
}

function renderMain() {
  const b = businesses.find(x => x.id===selectedId);
  if (!b) return;
  const done = countFiles(b), total = countTotal(b);
  const pct = total > 0 ? Math.round(done/total*100) : 0;
  document.getElementById('main').innerHTML = `
    <div class="biz-header">
      <div class="biz-header-top">
        <div class="biz-title">${b.name}</div>
        <div class="verdict-badge verdict-${b.verdict}" style="font-size:10px;padding:5px 14px;flex-shrink:0;margin-top:4px">
          ${b.verdict==='pursue'?'▲ Pursue Immediately':'✕ No-Go'}
        </div>
      </div>
      <div class="biz-meta-row">
        <div class="biz-meta-item">
          <div class="biz-meta-label">Market</div>
          <div class="biz-meta-value">${b.market}</div>
        </div>
        <div class="biz-meta-item">
          <div class="biz-meta-label">Researched</div>
          <div class="biz-meta-value">${formatDate(b.date)}</div>
        </div>
        <div class="biz-meta-item">
          <div class="biz-meta-label">Reports</div>
          <div class="biz-meta-value">${done} / ${total}</div>
        </div>
      </div>
      ${b.notes?`<div class="biz-notes">${b.notes}</div>`:''}
    </div>
    <div class="stats-row">
      <div class="stat-cell"><div class="stat-num">${done}</div><div class="stat-label">Done</div></div>
      <div class="stat-cell"><div class="stat-num">${total-done}</div><div class="stat-label">Remaining</div></div>
      <div class="stat-cell"><div class="stat-num">${pct}%</div><div class="stat-label">Complete</div></div>
    </div>
    <div class="phase-tabs-wrap"><div class="phase-tabs" id="phase-tabs"></div></div>
    <div id="phase-content"></div>
  `;
  renderTabs(b); renderPhaseContent(b);
}

function renderTabs(b) {
  const el = document.getElementById('phase-tabs');
  if (!el) return;
  el.innerHTML = TABS.map(tab => {
    const hasAny = tabHasAny(b,tab);
    const done = tabDoneCount(b,tab);
    const classes = ['phase-tab', activeTab===tab.id?'active':'', !hasAny?'disabled':'', tab.isSales?'sales-tab':''].filter(Boolean).join(' ');
    return `
      <div class="${classes}" onclick="selectTab('${tab.id}')">
        <span>${tab.label}</span>
        <span class="tab-count">${done}/${tab.reports.length}</span>
      </div>`;
  }).join('');
}

function renderPhaseContent(b) {
  const el = document.getElementById('phase-content');
  if (!el) return;
  const tab = TABS.find(t => t.id===activeTab);
  if (!tab) return;
  const isSales = tab.isSales;
  const phaseTitle = tab.sublabel ? `${tab.label} — ${tab.sublabel}` : tab.label;

  const rows = tab.reports.map((report, i) => {
    const file = b.files&&b.files[report.key];
    const num = String(i+1).padStart(2,'0');
    if (file) {
      return `
        <a class="report-row has-file ${isSales?'sales-row':''}" href="businesses/${b.id}/${file}" target="_blank">
          <div class="report-num">${num}</div>
          <div class="report-status ${isSales?'sales-done':'done'}">✓</div>
          <div class="report-info">
            <div class="report-name">${report.name}</div>
            <div class="report-desc">${report.desc}</div>
          </div>
          <div class="report-file">${file}</div>
          <div class="open-btn ${isSales?'sales':''}">Open ↗</div>
        </a>`;
    } else {
      return `
        <div class="report-row no-file">
          <div class="report-num">${num}</div>
          <div class="report-status"></div>
          <div class="report-info">
            <div class="report-name">${report.name}</div>
            <div class="report-desc">${report.desc}</div>
          </div>
          <div class="not-run-label">Not yet run</div>
        </div>`;
    }
  }).join('');

  el.innerHTML = `
    <div class="phase-content">
      <div class="phase-header">
        <div class="phase-title-row">
          <div class="phase-title">${phaseTitle}</div>
          <div class="phase-title-line"></div>
        </div>
        ${tab.sublabel?`<div class="phase-subtitle ${isSales?'sales':'gold'}">${
          isSales
            ? '// Runs independently — parallel to main phase track'
            : '// Runs as a unit — each report feeds the next'
        }</div>`:''}
      </div>
      <div class="reports-list">${rows}</div>
    </div>`;
}

loadAll();
</script>
