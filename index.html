<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Research Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#08091a;--bg2:#0c0e1f;--bg3:#121428;--bg4:#181b30;--bg5:#1e2138;
  --gold:#f5c842;--gold-dim:#c9a030;--gold-glow:rgba(245,200,66,0.15);
  --gold-bg:rgba(245,200,66,0.06);--gold-bd:rgba(245,200,66,0.22);
  --purple:#a78bfa;--purple-dim:#7c5fc7;--purple-glow:rgba(167,139,250,0.15);
  --purple-bg:rgba(167,139,250,0.07);--purple-bd:rgba(167,139,250,0.25);
  --pursue:#34d399;--pursue-bg:rgba(52,211,153,0.08);--pursue-bd:rgba(52,211,153,0.25);
  --nogo:#f87171;--nogo-bg:rgba(248,113,113,0.08);--nogo-bd:rgba(248,113,113,0.25);
  --text:#e2e0f0;--text2:#9896b0;--text3:#4e4c65;
  --border:rgba(255,255,255,0.055);--border2:rgba(255,255,255,0.1);--border3:rgba(255,255,255,0.16);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);}
#bg-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;display:block;}
body::after{content:'';position:fixed;inset:0;z-index:1;pointer-events:none;
  background-image:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.04) 3px,rgba(0,0,0,0.04) 4px);}
.app{position:relative;z-index:2;display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.topnav{display:flex;align-items:center;justify-content:space-between;height:56px;padding:0 28px;
  background:rgba(6,7,13,0.78);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);
  flex-shrink:0;position:relative;z-index:10;}
.topnav::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--purple-dim),var(--gold-dim),transparent);opacity:0.5;}
.nav-logo{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;
  letter-spacing:0.12em;text-transform:uppercase;display:flex;align-items:center;gap:10px;}
.nav-logo-icon{width:28px;height:28px;border-radius:6px;
  background:linear-gradient(135deg,var(--purple-dim),var(--gold-dim));
  display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#06070d;}
.nav-logo-text em{color:var(--gold);font-style:normal;}
.nav-right{display:flex;align-items:center;gap:16px;}
.nav-badge{font-family:'Space Mono',monospace;font-size:10px;color:var(--text2);
  letter-spacing:0.08em;padding:3px 10px;border-radius:20px;
  border:1px solid var(--border);background:rgba(10,12,20,0.6);}
.nav-pulse{width:6px;height:6px;border-radius:50%;background:var(--pursue);
  box-shadow:0 0 6px var(--pursue);animation:pulse-dot 2.5s ease-in-out infinite;}
@keyframes pulse-dot{0%,100%{opacity:1;box-shadow:0 0 6px var(--pursue);}50%{opacity:0.4;box-shadow:0 0 14px var(--pursue);}}
.layout{display:grid;grid-template-columns:272px 1fr;flex:1;min-height:0;}
.sidebar{border-right:1px solid var(--border);background:rgba(6,7,13,0.8);
  backdrop-filter:blur(20px);overflow-y:auto;padding:12px 10px;
  display:flex;flex-direction:column;gap:4px;position:relative;}
.sidebar::before{content:'';position:absolute;top:0;right:0;width:1px;height:100%;
  background:linear-gradient(180deg,var(--purple-dim),transparent 40%,var(--gold-dim) 100%);opacity:0.3;}
.sidebar-label{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:0.14em;
  color:var(--text3);padding:6px 10px 12px;text-transform:uppercase;
  display:flex;align-items:center;gap:8px;}
.sidebar-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border2),transparent);}
.biz-card{padding:12px 13px;border-radius:10px;border:1px solid transparent;
  cursor:pointer;transition:all 0.2s ease;background:transparent;position:relative;overflow:hidden;}
.biz-card::before{content:'';position:absolute;inset:0;border-radius:10px;
  background:linear-gradient(135deg,var(--purple-bg),transparent);opacity:0;transition:opacity 0.2s;}
.biz-card:hover{background:rgba(16,18,26,0.85);border-color:var(--border2);}
.biz-card:hover::before{opacity:1;}
.biz-card.active{background:rgba(22,25,34,0.92);border-color:var(--purple-bd);
  box-shadow:0 0 0 1px var(--purple-bg) inset,0 4px 20px rgba(0,0,0,0.4);}
.biz-card.active::before{opacity:1;}
.biz-card-name{font-size:12px;font-weight:600;color:var(--text);line-height:1.4;margin-bottom:8px;}
.biz-card-row{display:flex;align-items:center;justify-content:space-between;gap:6px;}
.biz-date{font-family:'Space Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:0.06em;}
.verdict-badge{font-family:'Space Mono',monospace;font-size:8px;font-weight:700;
  letter-spacing:0.1em;padding:2px 8px;border-radius:20px;text-transform:uppercase;white-space:nowrap;}
.verdict-pursue{background:var(--pursue-bg);color:var(--pursue);border:1px solid var(--pursue-bd);}
.verdict-nogo{background:var(--nogo-bg);color:var(--nogo);border:1px solid var(--nogo-bd);}
.progress-bar{margin-top:9px;height:2px;background:var(--border);border-radius:2px;overflow:hidden;}
.progress-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--purple-dim),var(--gold));
  transition:width 0.6s cubic-bezier(0.4,0,0.2,1);position:relative;}
.progress-fill::after{content:'';position:absolute;right:0;top:-1px;width:4px;height:4px;
  border-radius:50%;background:var(--gold);box-shadow:0 0 6px var(--gold);}
.progress-fill.nogo{background:linear-gradient(90deg,var(--nogo-bd),var(--nogo));}
.progress-fill.nogo::after{background:var(--nogo);box-shadow:0 0 6px var(--nogo);}
.main{display:flex;flex-direction:column;background:rgba(6,7,13,0.68);backdrop-filter:blur(14px);
  overflow:hidden;min-height:0;}
.main-empty{flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;color:var(--text3);gap:10px;}
.main-empty-ring{width:56px;height:56px;border-radius:50%;border:1px solid var(--border2);
  display:flex;align-items:center;justify-content:center;position:relative;}
.main-empty-ring::before{content:'';position:absolute;inset:-4px;border-radius:50%;
  border:1px solid transparent;border-top-color:var(--purple-dim);animation:spin 3s linear infinite;}
.main-empty-ring::after{content:'';position:absolute;inset:-8px;border-radius:50%;
  border:1px solid transparent;border-bottom-color:var(--gold-dim);animation:spin 5s linear infinite reverse;}
@keyframes spin{to{transform:rotate(360deg);}}
.main-empty-text{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:0.1em;}

/* biz header + stats — fixed at top of main, never scrolls */
.main-top{flex-shrink:0;}

/* phase tabs — sticky below main-top */
.phase-tabs-wrap{border-bottom:1px solid var(--border);overflow-x:auto;
  -webkit-overflow-scrolling:touch;background:rgba(6,7,13,0.92);
  backdrop-filter:blur(12px);flex-shrink:0;}
.phase-tabs-wrap::-webkit-scrollbar{display:none;}
.phase-tabs{display:flex;align-items:stretch;padding:0 28px;min-width:max-content;}

/* scrollable content area — only this scrolls */
.main-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;}
.biz-header{padding:24px 28px 0;background:transparent;}
.biz-header-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:10px;}
.biz-title{font-size:22px;font-weight:700;line-height:1.2;letter-spacing:-0.01em;
  background:linear-gradient(135deg,var(--text) 60%,var(--purple));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.biz-meta-row{display:flex;align-items:center;gap:24px;flex-wrap:wrap;margin-bottom:14px;}
.biz-meta-item{display:flex;align-items:center;gap:8px;}
.biz-meta-label{font-family:'Space Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase;}
.biz-meta-value{font-family:'Space Mono',monospace;font-size:11px;color:var(--text2);}
.biz-notes{font-size:12px;color:var(--text2);line-height:1.7;padding:10px 14px;border-radius:8px;
  background:rgba(10,12,20,0.75);border:1px solid var(--border);border-left:2px solid var(--gold-dim);
  margin-bottom:20px;position:relative;overflow:hidden;}
.biz-notes::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,var(--gold-dim),transparent);opacity:0.5;}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);
  border-top:1px solid var(--border);border-bottom:1px solid var(--border);}
.stat-cell{padding:16px 20px;background:rgba(6,7,13,0.75);text-align:center;
  position:relative;overflow:hidden;transition:background 0.2s;}
.stat-cell:hover{background:rgba(10,12,20,0.9);}
.stat-cell::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:40%;height:1px;background:linear-gradient(90deg,transparent,var(--purple-dim),transparent);opacity:0.6;}
.stat-num{font-family:'Space Mono',monospace;font-weight:700;font-size:28px;line-height:1;margin-bottom:4px;
  background:linear-gradient(135deg,var(--text),var(--purple));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.stat-label{font-family:'Space Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:0.12em;text-transform:uppercase;}
.phase-tab{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:0.1em;text-transform:uppercase;
  padding:13px 16px;cursor:pointer;border-bottom:2px solid transparent;color:var(--text2);
  transition:all 0.18s ease;white-space:nowrap;user-select:none;
  display:flex;flex-direction:column;align-items:center;gap:5px;position:relative;}
.phase-tab:hover{color:var(--text);background:rgba(16,18,26,0.5);}
.phase-tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.phase-tab.active::before{content:'';position:absolute;bottom:-1px;left:50%;transform:translateX(-50%);
  width:30px;height:4px;background:var(--gold);filter:blur(6px);border-radius:2px;}
.phase-tab.disabled{opacity:0.45;}
.phase-tab.sales-tab{margin:0 6px;border-left:1px solid var(--border);border-right:1px solid var(--border);}
.phase-tab.sales-tab.active{color:var(--purple);border-bottom-color:var(--purple);}
.phase-tab.sales-tab.active::before{background:var(--purple);}
.tab-count{font-size:8px;border-radius:10px;padding:1px 7px;min-width:26px;text-align:center;
  background:rgba(22,25,34,0.9);color:var(--text3);border:1px solid var(--border);transition:all 0.18s;}
.phase-tab.active .tab-count{background:var(--gold-bg);color:var(--gold);border-color:var(--gold-bd);}
.phase-tab.sales-tab.active .tab-count{background:var(--purple-bg);color:var(--purple);border-color:var(--purple-bd);}
.phase-content{padding:24px 28px;flex:1;}
.phase-header{margin-bottom:20px;}
.phase-title-row{display:flex;align-items:center;gap:12px;margin-bottom:5px;}
.phase-title{font-size:15px;font-weight:600;letter-spacing:-0.01em;}
.phase-title-line{flex:1;height:1px;background:linear-gradient(90deg,var(--border2),transparent);}
.phase-subtitle{font-family:'Space Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:0.06em;}
.phase-subtitle.gold{color:var(--gold-dim);}
.phase-subtitle.sales{color:var(--purple-dim);}
.reports-list{display:flex;flex-direction:column;gap:8px;}
.report-row{display:flex;align-items:center;gap:14px;padding:14px 18px;border-radius:10px;
  border:1px solid var(--border);background:rgba(10,12,20,0.75);backdrop-filter:blur(6px);
  transition:all 0.18s ease;text-decoration:none;color:inherit;position:relative;overflow:hidden;}
.report-row::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;
  background:linear-gradient(180deg,var(--purple),var(--gold));opacity:0;transition:opacity 0.18s;}
.report-row.has-file{border-color:var(--border2);background:rgba(16,18,26,0.8);}
.report-row.has-file:hover{background:rgba(22,25,34,0.92);border-color:var(--border3);
  transform:translateX(3px);box-shadow:0 4px 24px rgba(0,0,0,0.5);}
.report-row.has-file:hover::before{opacity:1;}
.report-row.no-file{opacity:0.35;}
.report-row.sales-row.has-file:hover::before{background:linear-gradient(180deg,var(--purple),var(--purple-dim));}
.report-num{font-family:'Space Mono',monospace;font-size:10px;color:var(--text3);width:20px;flex-shrink:0;}
.report-status{width:22px;height:22px;border-radius:50%;border:1px solid var(--border2);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;
  background:rgba(22,25,34,0.8);}
.report-status.done{background:var(--pursue-bg);border-color:var(--pursue-bd);color:var(--pursue);box-shadow:0 0 8px var(--pursue-bg);}
.report-status.sales-done{background:var(--purple-bg);border-color:var(--purple-bd);color:var(--purple);box-shadow:0 0 8px var(--purple-bg);}
.report-info{flex:1;min-width:0;}
.report-name{font-size:13px;font-weight:600;letter-spacing:0.005em;margin-bottom:3px;}
.report-desc{font-family:'Space Mono',monospace;font-size:9px;color:var(--text3);line-height:1.5;letter-spacing:0.03em;}
.report-file{font-family:'Space Mono',monospace;font-size:9px;color:var(--text3);white-space:nowrap;flex-shrink:0;}
.open-btn{font-family:'Space Mono',monospace;font-size:9px;font-weight:700;letter-spacing:0.1em;
  text-transform:uppercase;color:var(--gold);padding:6px 14px;border:1px solid var(--gold-bd);
  border-radius:6px;white-space:nowrap;flex-shrink:0;background:var(--gold-bg);transition:all 0.15s;}
.open-btn:hover{background:rgba(245,200,66,0.14);box-shadow:0 0 14px var(--gold-glow);}
.open-btn.sales{color:var(--purple);border-color:var(--purple-bd);background:var(--purple-bg);}
.open-btn.sales:hover{background:rgba(167,139,250,0.14);box-shadow:0 0 14px var(--purple-glow);}
.not-run-label{font-family:'Space Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:0.08em;text-transform:uppercase;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.report-row{animation:fadeUp 0.22s ease both;}
.report-row:nth-child(1){animation-delay:.02s}.report-row:nth-child(2){animation-delay:.06s}
.report-row:nth-child(3){animation-delay:.10s}.report-row:nth-child(4){animation-delay:.14s}
.report-row:nth-child(5){animation-delay:.18s}.report-row:nth-child(6){animation-delay:.22s}
.report-row:nth-child(7){animation-delay:.26s}

/* ── SEARCH BAR ── */
.search-wrap{padding:8px 8px 4px;flex-shrink:0;}
.search-inner{position:relative;}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:12px;pointer-events:none;}
.search-input{width:100%;background:rgba(12,14,24,0.85);border:1px solid var(--border2);border-radius:8px;
  padding:7px 10px 7px 28px;font-family:'Space Mono',monospace;font-size:10px;color:var(--text);
  letter-spacing:0.04em;outline:none;transition:border-color 0.18s;}
.search-input::placeholder{color:var(--text3);}
.search-input:focus{border-color:var(--purple-bd);box-shadow:0 0 0 2px var(--purple-bg);}
.search-empty{font-family:'Space Mono',monospace;font-size:10px;color:var(--text3);
  text-align:center;padding:16px 8px;letter-spacing:0.06em;}

/* ── SKILL LAUNCHER ── */
.launch-btn{font-family:'Space Mono',monospace;font-size:8px;font-weight:700;letter-spacing:0.08em;
  text-transform:uppercase;color:var(--purple);padding:5px 11px;
  border:1px solid var(--purple-bd);border-radius:6px;white-space:nowrap;flex-shrink:0;
  background:var(--purple-bg);cursor:pointer;transition:all 0.15s;text-decoration:none;display:inline-block;}
.launch-btn:hover{background:rgba(167,139,250,0.18);box-shadow:0 0 12px var(--purple-glow);}
.report-row.no-file{opacity:1 !important;}
.report-row.no-file .report-name{color:var(--text2);}
.report-row.no-file .report-num,.report-row.no-file .report-desc{opacity:0.5;}

/* ── PDF PREVIEW PANEL ── */
.preview-overlay{position:fixed;inset:0;z-index:500;display:flex;pointer-events:none;transition:opacity 0.3s;}
.preview-backdrop{flex:1;background:rgba(0,0,0,0);transition:background 0.3s;}
.preview-panel{width:min(700px,92vw);background:rgba(7,8,18,0.97);backdrop-filter:blur(28px);
  border-left:1px solid var(--border2);display:flex;flex-direction:column;
  transform:translateX(100%);transition:transform 0.32s cubic-bezier(0.4,0,0.2,1);}
.preview-overlay.open{pointer-events:all;}
.preview-overlay.open .preview-backdrop{background:rgba(0,0,0,0.6);}
.preview-overlay.open .preview-panel{transform:translateX(0);}
.preview-header{display:flex;align-items:center;justify-content:space-between;gap:12px;
  padding:14px 18px;border-bottom:1px solid var(--border);flex-shrink:0;position:relative;}
.preview-header::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--purple-dim),var(--gold-dim),transparent);opacity:0.5;}
.preview-title{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;color:var(--text);
  letter-spacing:0.05em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}
.preview-btns{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.preview-ext-btn{font-family:'Space Mono',monospace;font-size:9px;font-weight:700;letter-spacing:0.08em;
  color:var(--gold);padding:5px 12px;border:1px solid var(--gold-bd);border-radius:6px;
  background:var(--gold-bg);text-decoration:none;transition:all 0.15s;white-space:nowrap;}
.preview-ext-btn:hover{background:rgba(245,200,66,0.16);}
.preview-close{width:28px;height:28px;border-radius:6px;border:1px solid var(--border2);
  background:rgba(20,22,36,0.9);display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:13px;color:var(--text2);transition:all 0.15s;flex-shrink:0;}
.preview-close:hover{color:var(--text);border-color:var(--border3);}
.preview-body{flex:1;overflow:hidden;position:relative;min-height:0;}
.preview-iframe{width:100%;height:100%;border:none;display:block;}
.preview-loading{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:14px;}
.preview-spin{width:32px;height:32px;border-radius:50%;border:1px solid var(--border2);position:relative;}
.preview-spin::before{content:'';position:absolute;inset:-3px;border-radius:50%;
  border:2px solid transparent;border-top-color:var(--purple);animation:spin 1s linear infinite;}
.preview-loading-txt{font-family:'Space Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:0.08em;}
@media(max-width:700px){
  .preview-panel{width:100vw;height:80vh;border-left:none;border-top:1px solid var(--border2);
    position:fixed;bottom:0;right:0;transform:translateY(100%);}
  .preview-overlay.open .preview-panel{transform:translateY(0);}
  .preview-backdrop{flex:1;}
}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:4px;}

/* ── SEARCH BAR ── */
.search-wrap{padding:8px 8px 4px;flex-shrink:0;}
.search-inner{position:relative;}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px;pointer-events:none;}
.search-input{width:100%;background:rgba(12,14,24,0.85);border:1px solid var(--border2);border-radius:8px;
  padding:7px 10px 7px 28px;font-family:'Space Mono',monospace;font-size:10px;color:var(--text);
  letter-spacing:0.04em;outline:none;transition:border-color 0.18s;}
.search-input::placeholder{color:var(--text3);}
.search-input:focus{border-color:var(--purple-bd);box-shadow:0 0 0 2px var(--purple-bg);}
.search-empty{font-family:'Space Mono',monospace;font-size:10px;color:var(--text3);text-align:center;padding:16px 8px;letter-spacing:0.06em;}

/* ── SKILL LAUNCHER ── */
.launch-btn{font-family:'Space Mono',monospace;font-size:8px;font-weight:700;letter-spacing:0.08em;
  text-transform:uppercase;color:var(--purple);padding:5px 11px;border:1px solid var(--purple-bd);
  border-radius:6px;white-space:nowrap;flex-shrink:0;background:var(--purple-bg);
  cursor:pointer;transition:all 0.15s;text-decoration:none;display:inline-block;}
.launch-btn:hover{background:rgba(167,139,250,0.18);box-shadow:0 0 12px var(--purple-glow);}
.report-row.no-file{opacity:1;}
.report-row.no-file .report-name{color:var(--text2);}

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
  const canvas=document.getElementById('bg-canvas');
  const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
  renderer.setPixelRatio(Math.min(devicePixelRatio,1.5));
  renderer.setClearColor(0x08091a,1);
  const scene=new THREE.Scene();
  const camera=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,0.1,300);
  camera.position.set(0,18,38);
  camera.lookAt(0,0,0);
  function onResize(){renderer.setSize(innerWidth,innerHeight);camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();}
  onResize();window.addEventListener('resize',onResize);

  const LAYERS=[
    {cols:130,rows:65,spread:58,depth:30,yOff:-4, hS:5.5,spd:0.40,cA:0x9333ea,cB:0xfbcffe},
    {cols:110,rows:55,spread:50,depth:26,yOff:-1, hS:4.5,spd:0.30,cA:0xa855f7,cB:0xf0abfc},
    {cols:90, rows:45,spread:42,depth:22,yOff:2,  hS:3.6,spd:0.22,cA:0xb975ff,cB:0xe0aaff},
    {cols:70, rows:35,spread:34,depth:18,yOff:4,  hS:2.8,spd:0.15,cA:0xc084fc,cB:0xfae8ff},
  ];

  const waves=LAYERS.map(L=>{
    const count=L.cols*L.rows;
    const pos=new Float32Array(count*3);
    const col=new Float32Array(count*3);
    const baseY=new Float32Array(count);
    const cA=new THREE.Color(L.cA),cB=new THREE.Color(L.cB);
    let i=0;
    for(let r=0;r<L.rows;r++){for(let c=0;c<L.cols;c++){
      const x=(c/(L.cols-1)-0.5)*L.spread;
      const z=(r/(L.rows-1)-0.5)*L.depth;
      pos[i*3]=x;pos[i*3+1]=L.yOff;pos[i*3+2]=z;baseY[i]=L.yOff;
      const t=r/(L.rows-1);
      const mix=cA.clone().lerp(cB,t*0.5+0.3);
      col[i*3]=mix.r;col[i*3+1]=mix.g;col[i*3+2]=mix.b;
      i++;
    }}
    const geo=new THREE.BufferGeometry();
    geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
    geo.setAttribute('color',new THREE.BufferAttribute(col,3));
    const mat=new THREE.PointsMaterial({
      size:LAYERS.indexOf(L)===0?0.36:LAYERS.indexOf(L)===1?0.28:0.22,
      vertexColors:true,transparent:true,opacity:1.0,sizeAttenuation:true
    });
    const pts=new THREE.Points(geo,mat);
    scene.add(pts);
    return{pts,geo,pos,col,baseY,L};
  });

  scene.fog=new THREE.FogExp2(0x08091a,0.005);

  let mx=0,my=0,tmx=0,tmy=0;
  document.addEventListener('mousemove',e=>{mx=(e.clientX/innerWidth-0.5);my=(e.clientY/innerHeight-0.5);});

  let t=0;
  const cPeak=new THREE.Color(0xfff7a0);   // bright gold peak
  const cCrest=new THREE.Color(0xfcd34d);  // vivid amber crest tip
  function animate(){
    requestAnimationFrame(animate);t+=0.011;
    tmx+=(mx-tmx)*0.04;tmy+=(my-tmy)*0.04;
    camera.position.x+=(tmx*6-camera.position.x)*0.03;
    camera.position.y+=(-tmy*3+18-camera.position.y)*0.03;
    camera.lookAt(0,2,0);

    waves.forEach(({geo,pos,col,baseY,L},li)=>{
      const p=geo.attributes.position.array;
      let i=0;
      for(let r=0;r<L.rows;r++){for(let c=0;c<L.cols;c++){
        const x=pos[i*3],z=pos[i*3+2];
        p[i*3+1]=baseY[i]+
          Math.sin(x*0.20+t*L.spd*2.2)*L.hS*0.55+
          Math.sin(z*0.24+t*L.spd*1.8)*L.hS*0.45+
          Math.sin((x+z)*0.13+t*L.spd*1.4)*L.hS*0.38+
          Math.sin(x*0.38-z*0.16+t*L.spd*3.0)*L.hS*0.22+
          Math.sin(x*0.09+z*0.07+t*L.spd*1.0)*L.hS*0.65;
        i++;
      }}
      geo.attributes.position.needsUpdate=true;

      const cl=geo.attributes.color.array;
      const cA=new THREE.Color(L.cA),cB=new THREE.Color(L.cB);
      i=0;
      for(let r=0;r<L.rows;r++){for(let c=0;c<L.cols;c++){
        const h=p[i*3+1];
        const n=Math.max(0,Math.min(1,(h-baseY[i]+L.hS)/(L.hS*2)));
        let mc;
        if(n>0.82)      mc=cPeak.clone().lerp(cCrest,(n-0.82)/0.18);  // gold → bright yellow at very tip
        else if(n>0.55) mc=cB.clone().lerp(cPeak,(n-0.55)/0.27);      // purple → gold transition
        else            mc=cA.clone().lerp(cB,n/0.55);                 // deep → bright purple
        cl[i*3]=mc.r;cl[i*3+1]=mc.g;cl[i*3+2]=mc.b;
        i++;
      }}
      geo.attributes.color.needsUpdate=true;
    });
    renderer.render(scene,camera);
  }
  animate();
})();
</script>

let businesses=[],selectedId=null,activeTab='research';
async function loadAll(){
  const results=await Promise.all(BUSINESSES.map(id=>fetch('businesses/'+id+'/meta.json').then(r=>r.json()).then(d=>({id,...d})).catch(()=>null)));
  businesses=results.filter(Boolean).sort((a,b)=>new Date(b.date)-new Date(a.date));
  const pursuing=businesses.filter(b=>b.verdict==='pursue').length;
  document.getElementById('nav-meta').textContent=businesses.length+' businesses \u00b7 '+pursuing+' pursuing';
  renderSidebar();if(businesses.length)selectBusiness(businesses[0].id);
}
function countFiles(b){return Object.values(b.files||{}).filter(Boolean).length;}
function countTotal(b){return Object.keys(b.files||{}).length;}
function tabDoneCount(b,tab){return tab.reports.filter(r=>b.files&&b.files[r.key]).length;}
function tabHasAny(b,tab){return tab.reports.some(r=>b.files&&b.files[r.key]);}
function formatDate(iso){return new Date(iso+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
let searchQ='';
function onSearch(v){searchQ=v;renderSidebar();}
function renderSidebar(){
  const list=businesses.filter(b=>b.name.toLowerCase().includes(searchQ.toLowerCase()));
  const cards=list.map(b=>{
    const done=countFiles(b),total=countTotal(b),pct=total>0?Math.round(done/total*100):0;
    return '<div class="biz-card '+(selectedId===b.id?'active':'')+'" onclick="selectBusiness(\''+b.id+'\')">'+

    '<div class="biz-card-row"><div class="biz-date">'+formatDate(b.date)+'</div>'+
    '<div class="verdict-badge verdict-'+b.verdict+'">'+(b.verdict==='pursue'?'\u25b2 Pursue':'\u2715 No-Go')+'</div></div>'+
    '<div class="progress-bar"><div class="progress-fill'+(b.verdict==='nogo'?' nogo':'')+'" style="width:'+pct+'%"></div></div></div>';
  }).join('');
  const empty=list.length===0?'<div class="search-empty">No matches</div>':'';

    '</div></div>'+cards+empty;

function selectBusiness(id){selectedId=id;activeTab='research';renderSidebar();renderMain();}
function selectTab(tabId){
  const b=businesses.find(x=>x.id===selectedId),tab=TABS.find(t=>t.id===tabId);
  if(!b||!tab)return;activeTab=tabId;renderTabs(b);renderPhaseContent(b);

  const b=businesses.find(x=>x.id===selectedId);if(!b)return;

    return '<div class="report-row no-file">'+
      '<div class="report-num">'+num+'</div><div class="report-status"></div>'+
      '<div class="report-info"><div class="report-name">'+report.name+'</div><div class="report-desc">'+report.desc+'</div></div>'+
      '<a class="launch-btn" href="'+claudeUrl+'" target="_blank">Run in Claude \u2197</a></div>';
  }).join('');
  el.innerHTML='<div class="phase-content"><div class="phase-header"><div class="phase-title-row">'+
    '<div class="phase-title">'+phaseTitle+'</div><div class="phase-title-line"></div></div>'+
    (tab.sublabel?'<div class="phase-subtitle '+(isSales?'sales':'gold')+'">'+(isSales?'// Runs independently \u2014 parallel to main phase track':'// Runs as a unit \u2014 each report feeds the next')+'</div>':'')+
    '</div><div class="reports-list">'+rows+'</div></div>';
}
function openPreview(src,title){
  document.getElementById('preview-title').textContent=title;
  document.getElementById('preview-ext').href=src;
  const iframe=document.getElementById('preview-iframe');
  const loading=document.getElementById('preview-loading');
  iframe.style.display='none';loading.style.display='flex';
  iframe.src=src;
  document.getElementById('preview-overlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function onIframeLoad(){
  document.getElementById('preview-iframe').style.display='block';
  document.getElementById('preview-loading').style.display='none';
}
function closePreview(){
  document.getElementById('preview-overlay').classList.remove('open');
  document.body.style.overflow='';
  setTimeout(()=>{
    const f=document.getElementById('preview-iframe');
    f.src='about:blank';f.style.display='none';
    document.getElementById('preview-loading').style.display='flex';
  },320);
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closePreview();});
loadAll();
</script>

<!-- PDF PREVIEW PANEL -->
<div class="preview-overlay" id="preview-overlay">
  <div class="preview-backdrop" onclick="closePreview()"></div>
  <div class="preview-panel">
    <div class="preview-header">
      <div class="preview-title" id="preview-title">Report</div>
      <div class="preview-btns">
        <a class="preview-ext-btn" id="preview-ext" href="#" target="_blank">Open Tab ↗</a>
        <div class="preview-close" onclick="closePreview()">&#10005;</div>
      </div>
    </div>
    <div class="preview-body">
      <div class="preview-loading" id="preview-loading">
        <div class="preview-spin"></div>
        <div class="preview-loading-txt">Loading report...</div>
      </div>
      <iframe class="preview-iframe" id="preview-iframe" style="display:none" onload="onIframeLoad()"></iframe>
    </div>
  </div>
</div>
</body>
