<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Opportunity Finder — Research Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#08091a;--bg2:#0c0e1f;--bg3:#121428;--bg4:#181b30;
  --gold:#f5c842;--gold-dim:#c9a030;--gold-glow:rgba(245,200,66,0.15);
  --gold-bg:rgba(245,200,66,0.06);--gold-bd:rgba(245,200,66,0.22);
  --purple:#a78bfa;--purple-dim:#7c5fc7;--purple-glow:rgba(167,139,250,0.15);
  --purple-bg:rgba(167,139,250,0.07);--purple-bd:rgba(167,139,250,0.25);
  --pursue:#34d399;--pursue-bg:rgba(52,211,153,0.08);--pursue-bd:rgba(52,211,153,0.25);
  --nogo:#f87171;
  --text:#e2e0f0;--text2:#9896b0;--text3:#4e4c65;
  --border:rgba(255,255,255,0.055);--border2:rgba(255,255,255,0.1);--border3:rgba(255,255,255,0.16);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);}

#bg-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;}
body::after{content:'';position:fixed;inset:0;z-index:1;pointer-events:none;
  background-image:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.04) 3px,rgba(0,0,0,0.04) 4px);}

.app{position:relative;z-index:2;display:flex;flex-direction:column;height:100vh;}

/* NAV */
.topnav{display:flex;align-items:center;justify-content:space-between;height:56px;padding:0 28px;
  background:rgba(6,7,13,0.78);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);
  flex-shrink:0;position:relative;z-index:10;}
.topnav::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--purple-dim),var(--gold-dim),transparent);opacity:0.5;}
.nav-logo{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;
  letter-spacing:0.12em;text-transform:uppercase;display:flex;align-items:center;gap:10px;
  cursor:pointer;text-decoration:none;color:var(--text);}
.nav-logo-text em{color:var(--gold);font-style:normal;}
.nav-back{font-family:'Space Mono',monospace;font-size:10px;color:var(--text2);
  letter-spacing:0.08em;display:flex;align-items:center;gap:6px;cursor:pointer;
  padding:5px 12px;border:1px solid var(--border);border-radius:6px;
  background:transparent;transition:all 0.15s;text-decoration:none;}
.nav-back:hover{color:var(--text);border-color:var(--border2);}

/* CHAT LAYOUT */
.chat-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;}

/* MESSAGES AREA */
.messages{flex:1;overflow-y:auto;padding:32px 20px 20px;display:flex;flex-direction:column;gap:20px;
  -webkit-overflow-scrolling:touch;overscroll-behavior:contain;}
.messages::-webkit-scrollbar{width:4px;}
.messages::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:4px;}

/* MESSAGE BUBBLES */
.msg{display:flex;gap:14px;align-items:flex-start;max-width:780px;margin:0 auto;width:100%;}
.msg.user{flex-direction:row-reverse;}
.msg-avatar{width:34px;height:34px;border-radius:10px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:14px;}
.msg-avatar.claude{background:linear-gradient(135deg,var(--purple-dim),var(--gold-dim));}
.msg-avatar.user{background:rgba(167,139,250,0.15);border:1px solid var(--purple-bd);color:var(--purple);font-size:12px;font-weight:700;font-family:'Space Mono',monospace;}
.msg-bubble{padding:14px 18px;border-radius:14px;font-size:14px;line-height:1.7;max-width:580px;}
.msg.claude .msg-bubble{background:rgba(16,18,30,0.9);border:1px solid var(--border2);color:var(--text);border-top-left-radius:4px;}
.msg.user .msg-bubble{background:var(--purple-bg);border:1px solid var(--purple-bd);color:var(--text);border-top-right-radius:4px;}

/* OPTION CHIPS */
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;}
.chip{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:0.04em;
  padding:8px 16px;border-radius:99px;border:1px solid var(--border2);
  background:rgba(20,22,36,0.8);color:var(--text2);cursor:pointer;
  transition:all 0.18s ease;user-select:none;}
.chip:hover{border-color:var(--purple-bd);background:var(--purple-bg);color:var(--purple);}
.chip.selected{border-color:var(--purple);background:var(--purple-bg);color:var(--purple);
  box-shadow:0 0 12px var(--purple-glow);}

/* PROGRESS DOTS */
.progress-wrap{display:flex;justify-content:center;align-items:center;gap:8px;padding:16px;flex-shrink:0;}
.prog-dot{width:8px;height:8px;border-radius:50%;background:var(--border2);transition:all 0.3s ease;}
.prog-dot.active{background:linear-gradient(135deg,var(--purple),var(--gold));width:24px;border-radius:4px;}
.prog-dot.done{background:var(--pursue);}

/* INPUT AREA */
.input-area{flex-shrink:0;padding:16px 20px;background:rgba(6,7,13,0.85);
  backdrop-filter:blur(20px);border-top:1px solid var(--border);}
.input-inner{max-width:780px;margin:0 auto;display:flex;gap:12px;align-items:flex-end;}
.chat-input{flex:1;background:rgba(12,14,24,0.9);border:1px solid var(--border2);
  border-radius:14px;padding:14px 18px;font-family:'Space Grotesk',sans-serif;
  font-size:14px;color:var(--text);resize:none;outline:none;line-height:1.5;
  transition:border-color 0.2s;min-height:52px;max-height:140px;}
.chat-input:focus{border-color:var(--purple-bd);box-shadow:0 0 0 2px var(--purple-bg);}
.chat-input::placeholder{color:var(--text3);}
.send-btn{width:52px;height:52px;border-radius:14px;border:1px solid var(--purple-bd);
  background:var(--purple-bg);color:var(--purple);cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:all 0.18s;font-size:18px;}
.send-btn:hover{background:rgba(167,139,250,0.18);box-shadow:0 0 16px var(--purple-glow);}
.send-btn:disabled{opacity:0.35;cursor:not-allowed;}

/* TYPING INDICATOR */
.typing{display:flex;align-items:center;gap:5px;padding:14px 18px;}
.typing-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);animation:typing-bounce 1.2s infinite;}
.typing-dot:nth-child(2){animation-delay:0.2s;}
.typing-dot:nth-child(3){animation-delay:0.4s;}
@keyframes typing-bounce{0%,80%,100%{transform:translateY(0);}40%{transform:translateY(-6px);opacity:0.8;}}

/* SUMMARY CARD */
.summary-card{background:rgba(12,14,24,0.9);border:1px solid var(--border2);border-radius:14px;
  padding:20px;margin-top:14px;width:100%;}
.summary-card-title{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:0.12em;
  text-transform:uppercase;color:var(--text3);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.summary-card-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border2),transparent);}
.summary-rows{display:flex;flex-direction:column;gap:8px;}
.summary-row{display:flex;align-items:baseline;gap:10px;}
.summary-label{font-family:'Space Mono',monospace;font-size:9px;color:var(--text3);
  letter-spacing:0.08em;text-transform:uppercase;width:130px;flex-shrink:0;}
.summary-val{font-size:13px;font-weight:500;color:var(--text);}

/* RUN BUTTON */
.run-wrap{margin-top:18px;}
.run-btn{display:inline-flex;align-items:center;gap:10px;
  font-family:'Space Mono',monospace;font-size:12px;font-weight:700;letter-spacing:0.1em;
  text-transform:uppercase;color:var(--purple);padding:14px 32px;
  border:1px solid var(--purple-bd);border-radius:10px;background:var(--purple-bg);
  cursor:pointer;transition:all 0.18s;position:relative;overflow:hidden;}
.run-btn::before{content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(167,139,250,0.1),transparent);
  transform:translateX(-100%);transition:transform 0.5s;}
.run-btn:hover{background:rgba(167,139,250,0.14);box-shadow:0 0 24px var(--purple-glow);border-color:var(--purple);}
.run-btn:hover::before{transform:translateX(100%);}
.run-btn:disabled{opacity:0.4;cursor:not-allowed;}
.run-dot{width:7px;height:7px;border-radius:50%;background:var(--purple);
  box-shadow:0 0 8px var(--purple);animation:pulse-dot 2s infinite;flex-shrink:0;}
@keyframes pulse-dot{0%,100%{opacity:1;}50%{opacity:0.3;}}

/* RUNNING STATE */
.running-state{display:flex;flex-direction:column;align-items:center;gap:16px;padding:40px 20px;text-align:center;}
.running-ring{width:64px;height:64px;border-radius:50%;border:1px solid var(--border2);
  display:flex;align-items:center;justify-content:center;position:relative;}
.running-ring::before{content:'';position:absolute;inset:-4px;border-radius:50%;
  border:2px solid transparent;border-top-color:var(--purple);animation:spin 1s linear infinite;}
.running-ring::after{content:'';position:absolute;inset:-9px;border-radius:50%;
  border:1px solid transparent;border-bottom-color:var(--gold-dim);animation:spin 2.2s linear infinite reverse;}
@keyframes spin{to{transform:rotate(360deg);}}
.running-text{font-family:'Space Mono',monospace;font-size:11px;color:var(--text3);letter-spacing:0.08em;}
.running-sub{font-size:12px;color:var(--text3);line-height:1.6;max-width:320px;}

/* MOBILE */
@media(max-width:600px){
  .topnav{padding:0 16px;}
  .messages{padding:20px 12px 16px;}
  .msg{max-width:100%;}
  .msg-bubble{max-width:100%;font-size:13px;padding:12px 14px;}
  .input-area{padding:12px 14px;}
  .chat-input{font-size:13px;padding:12px 14px;}
  .send-btn{width:46px;height:46px;}
}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.msg{animation:fadeUp 0.25s ease both;}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div class="app">
  <nav class="topnav">
    <a class="nav-logo" href="index.html">
      <img src="https://raw.githubusercontent.com/mahdiahmedofficial-wq/research-dashboard/main/logo.png" style="width:28px;height:28px;border-radius:6px;object-fit:cover;" onerror="this.style.display='none'" />
      <div class="nav-logo-text">Research<em>Hub</em></div>
    </a>
    <a class="nav-back" href="index.html">← Back to Dashboard</a>
  </nav>

  <div class="chat-wrap">
    <div class="messages" id="messages"></div>
    <div class="progress-wrap" id="progress-wrap"></div>
    <div class="input-area" id="input-area">
      <div class="input-inner">
        <textarea class="chat-input" id="chat-input" placeholder="Type your answer..." rows="1"
          onkeydown="onInputKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="send-btn" onclick="handleSend()" title="Send">↑</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── Background wave (same as index.html) ──
(function(){
  const canvas=document.getElementById('bg-canvas');
  const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
  renderer.setPixelRatio(Math.min(devicePixelRatio,1.5));
  renderer.setClearColor(0x08091a,1);
  const scene=new THREE.Scene();
  const camera=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,0.1,300);
  camera.position.set(0,18,38);camera.lookAt(0,0,0);
  function onResize(){renderer.setSize(innerWidth,innerHeight);camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();}
  onResize();window.addEventListener('resize',onResize);
  const LAYERS=[
    {cols:100,rows:50,spread:50,depth:26,yOff:-4,hS:4.5,spd:0.40,cA:0x9333ea,cB:0xfbcffe},
    {cols:80,rows:40,spread:42,depth:22,yOff:2,hS:3.6,spd:0.22,cA:0xb975ff,cB:0xe0aaff},
  ];
  const waves=LAYERS.map(L=>{
    const count=L.cols*L.rows;
    const pos=new Float32Array(count*3);
    const col=new Float32Array(count*3);
    const baseY=new Float32Array(count);
    const cA=new THREE.Color(L.cA),cB=new THREE.Color(L.cB);
    let i=0;
    for(let r=0;r<L.rows;r++){for(let c=0;c<L.cols;c++){
      const x=(c/(L.cols-1)-0.5)*L.spread;const z=(r/(L.rows-1)-0.5)*L.depth;
      pos[i*3]=x;pos[i*3+1]=L.yOff;pos[i*3+2]=z;baseY[i]=L.yOff;
      const t=r/(L.rows-1);const mix=cA.clone().lerp(cB,t*0.5+0.3);
      col[i*3]=mix.r;col[i*3+1]=mix.g;col[i*3+2]=mix.b;i++;
    }}
    const geo=new THREE.BufferGeometry();
    geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
    geo.setAttribute('color',new THREE.BufferAttribute(col,3));
    const mat=new THREE.PointsMaterial({size:0.28,vertexColors:true,transparent:true,opacity:0.9,sizeAttenuation:true});
    const pts=new THREE.Points(geo,mat);scene.add(pts);
    return{pts,geo,pos,col,baseY,L};
  });
  scene.fog=new THREE.FogExp2(0x08091a,0.006);
  let t=0;
  const cPeak=new THREE.Color(0xfff7a0),cCrest=new THREE.Color(0xfcd34d);
  function animate(){
    requestAnimationFrame(animate);t+=0.011;
    waves.forEach(({geo,pos,col,baseY,L})=>{
      const p=geo.attributes.position.array;let i=0;
      for(let r=0;r<L.rows;r++){for(let c=0;c<L.cols;c++){
        const x=pos[i*3],z=pos[i*3+2];
        p[i*3+1]=baseY[i]+Math.sin(x*0.20+t*L.spd*2.2)*L.hS*0.55+Math.sin(z*0.24+t*L.spd*1.8)*L.hS*0.45+Math.sin((x+z)*0.13+t*L.spd*1.4)*L.hS*0.38+Math.sin(x*0.09+z*0.07+t*L.spd*1.0)*L.hS*0.65;i++;
      }}
      geo.attributes.position.needsUpdate=true;
      const cl=geo.attributes.color.array;const cA=new THREE.Color(L.cA),cB=new THREE.Color(L.cB);i=0;
      for(let r=0;r<L.rows;r++){for(let c=0;c<L.cols;c++){
        const h=p[i*3+1];const n=Math.max(0,Math.min(1,(h-baseY[i]+L.hS)/(L.hS*2)));
        let mc;
        if(n>0.82)mc=cPeak.clone().lerp(cCrest,(n-0.82)/0.18);
        else if(n>0.55)mc=cB.clone().lerp(cPeak,(n-0.55)/0.27);
        else mc=cA.clone().lerp(cB,n/0.55);
        cl[i*3]=mc.r;cl[i*3+1]=mc.g;cl[i*3+2]=mc.b;i++;
      }}
      geo.attributes.color.needsUpdate=true;
    });
    renderer.render(scene,camera);
  }
  animate();
})();
</script>

<script>
const BACKEND_URL = 'https://research-hub-backend-production.up.railway.app';

// ── QUESTIONS ──
const QUESTIONS = [
  {
    id: 'businessType',
    question: 'What type of business are you looking for?',
    chips: ['Service-based','Product / physical','Digital / software','Franchise','Still figuring it out'],
    freeText: false,
  },
  {
    id: 'industry',
    question: 'Any industry or sector you want to focus on?',
    chips: ['Home services','B2B / commercial','Health & wellness','Construction & trades','Food & beverage','Tech-adjacent','Open to anything'],
    freeText: true,
    placeholder: 'Type a specific industry, or pick one above...',
  },
  {
    id: 'serviceModel',
    question: 'What revenue model do you prefer?',
    chips: ['Recurring (subscriptions, retainers)','One-time (projects, jobs)','Both are fine'],
    freeText: false,
  },
  {
    id: 'budget',
    question: 'What\'s your startup budget?',
    chips: ['Under $5K','$5K – $15K','$15K – $50K','$50K+'],
    freeText: false,
  },
  {
    id: 'competition',
    question: 'How comfortable are you with competition?',
    chips: ['Low — I want underserved niches','Medium — established markets are fine','High — I can out-execute anyone','Doesn\'t matter'],
    freeText: false,
  },
  {
    id: 'speed',
    question: 'How quickly do you need your first paying client?',
    chips: ['Within 30 days','1–3 months','3–6 months','No rush'],
    freeText: false,
  },
  {
    id: 'location',
    question: 'Where are you starting this business?',
    chips: ['Twin Cities, MN','Remote / location-independent','Other city or region'],
    freeText: true,
    placeholder: 'Type your city or region...',
  },
];

// ── STATE ──
let currentStep = 0;
let userProfile = {};
let awaitingFreeText = false;
let selectedChip = null;

// ── DOM ──
const messagesEl = document.getElementById('messages');
const progressWrap = document.getElementById('progress-wrap');
const inputArea = document.getElementById('input-area');
const chatInput = document.getElementById('chat-input');
const sendBtn = document.getElementById('send-btn');

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 140) + 'px';
}

function onInputKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
}

function scrollToBottom() {
  setTimeout(() => { messagesEl.scrollTop = messagesEl.scrollHeight; }, 60);
}

// ── RENDER PROGRESS ──
function renderProgress() {
  const total = QUESTIONS.length;
  progressWrap.innerHTML = QUESTIONS.map((_, i) => {
    const cls = i < currentStep ? 'done' : i === currentStep ? 'active' : '';
    return `<div class="prog-dot ${cls}"></div>`;
  }).join('');
}

// ── ADD MESSAGE ──
function addMessage(role, html, delay = 0) {
  return new Promise(resolve => {
    setTimeout(() => {
      const msg = document.createElement('div');
      msg.className = `msg ${role}`;
      const avatarHtml = role === 'claude'
        ? '<div class="msg-avatar claude">✦</div>'
        : '<div class="msg-avatar user">YOU</div>';
      msg.innerHTML = avatarHtml + `<div class="msg-bubble">${html}</div>`;
      messagesEl.appendChild(msg);
      scrollToBottom();
      resolve();
    }, delay);
  });
}

// ── ADD TYPING INDICATOR ──
function showTyping() {
  const el = document.createElement('div');
  el.className = 'msg claude';
  el.id = 'typing-indicator';
  el.innerHTML = '<div class="msg-avatar claude">✦</div><div class="msg-bubble"><div class="typing"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>';
  messagesEl.appendChild(el);
  scrollToBottom();
}

function hideTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

// ── ASK QUESTION ──
async function askQuestion(stepIndex) {
  const q = QUESTIONS[stepIndex];
  awaitingFreeText = false;
  selectedChip = null;
  renderProgress();

  showTyping();
  await new Promise(r => setTimeout(r, 600));
  hideTyping();

  // Build bubble content
  let html = `<div>${q.question}</div>`;
  if (q.chips && q.chips.length) {
    html += '<div class="chips" id="chips-' + stepIndex + '">';
    q.chips.forEach(c => {
      html += `<div class="chip" onclick="selectChip(this,'${escAttr(c)}',${stepIndex})">${c}</div>`;
    });
    html += '</div>';
  }

  await addMessage('claude', html);

  if (q.freeText) {
    chatInput.placeholder = q.placeholder || 'Type your answer...';
    chatInput.disabled = false;
    sendBtn.disabled = false;
    awaitingFreeText = true;
  } else {
    chatInput.placeholder = 'Pick an option above...';
    chatInput.disabled = true;
    sendBtn.disabled = true;
  }
  chatInput.value = '';
  chatInput.style.height = 'auto';
}

function escAttr(s) {
  return s.replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

// ── CHIP SELECTION ──
function selectChip(el, value, stepIndex) {
  if (stepIndex !== currentStep) return;
  // Toggle selection
  const container = document.getElementById('chips-' + stepIndex);
  if (container) container.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  selectedChip = value;

  // If free-text question, also populate input
  const q = QUESTIONS[stepIndex];
  if (q.freeText) {
    chatInput.value = value;
    chatInput.disabled = false;
    sendBtn.disabled = false;
    autoResize(chatInput);
  } else {
    // Auto-advance after brief delay
    setTimeout(() => advanceWithValue(value), 300);
  }
}

// ── HANDLE SEND ──
function handleSend() {
  const val = chatInput.value.trim();
  if (!val && !selectedChip) return;
  const finalVal = val || selectedChip;
  advanceWithValue(finalVal);
}

async function advanceWithValue(value) {
  const q = QUESTIONS[currentStep];
  // Disable input while processing
  chatInput.disabled = true;
  sendBtn.disabled = true;

  // Show user message
  await addMessage('user', escHtml(value));

  // Store answer
  userProfile[q.id] = value;
  currentStep++;

  if (currentStep < QUESTIONS.length) {
    await askQuestion(currentStep);
  } else {
    await showSummary();
  }
}

function escHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ── SHOW SUMMARY ──
async function showSummary() {
  renderProgress();
  chatInput.disabled = true;
  sendBtn.disabled = true;
  inputArea.style.display = 'none';

  showTyping();
  await new Promise(r => setTimeout(r, 800));
  hideTyping();

  const labelMap = {
    businessType: 'Business Type',
    industry: 'Industry',
    serviceModel: 'Revenue Model',
    budget: 'Budget',
    competition: 'Competition',
    speed: 'Speed to First Client',
    location: 'Location',
  };

  const rows = Object.entries(userProfile).map(([k, v]) =>
    `<div class="summary-row"><div class="summary-label">${labelMap[k] || k}</div><div class="summary-val">${escHtml(v)}</div></div>`
  ).join('');

  const summaryHtml = `
    <div>Here's what you're looking for. Ready to find your opportunities?</div>
    <div class="summary-card">
      <div class="summary-card-title">Your Profile</div>
      <div class="summary-rows">${rows}</div>
    </div>
    <div class="run-wrap">
      <button class="run-btn" id="run-btn" onclick="runOpportunityFinder()">
        <span class="run-dot"></span> Find My Opportunities
      </button>
    </div>`;

  await addMessage('claude', summaryHtml);
}

// ── RUN THE SKILL ──
async function runOpportunityFinder() {
  document.getElementById('run-btn').disabled = true;

  // Show running state
  showTyping();
  await new Promise(r => setTimeout(r, 500));
  hideTyping();

  await addMessage('claude', `
    <div class="running-state">
      <div class="running-ring">✦</div>
      <div class="running-text">Searching for opportunities...</div>
      <div class="running-sub">Claude is analyzing your profile and finding high-confidence businesses that match your criteria. This takes 30–90 seconds.</div>
    </div>`);

  try {
    const res = await fetch(BACKEND_URL + '/run-skill', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        bizId: '__opportunity__',
        skillKey: 'opportunity-finder',
        userProfile: {
          businessType: userProfile.businessType || '',
          industry: userProfile.industry || '',
          serviceModel: userProfile.serviceModel || '',
          budget: userProfile.budget || '',
          competition: userProfile.competition || '',
          speed: userProfile.speed || '',
          location: userProfile.location || 'Twin Cities, MN',
        }
      })
    });

    const data = await res.json();
    if (!data.ok) throw new Error(data.error);

    // Success — store output and redirect
    sessionStorage.setItem('opportunity_output', data.output);
    sessionStorage.setItem('opportunity_profile', JSON.stringify(userProfile));
    sessionStorage.setItem('opportunity_tokens', JSON.stringify({
      input: data.inputTokens || 0,
      output: data.outputTokens || 0,
    }));

    showTyping();
    await new Promise(r => setTimeout(r, 600));
    hideTyping();

    await addMessage('claude', `
      <div>✓ Done! Your opportunities are ready.</div>
      <div style="margin-top:12px;">
        <button class="run-btn" onclick="window.location.href='index.html?tab=research&notify=opportunities'" style="background:var(--pursue-bg);border-color:var(--pursue-bd);color:var(--pursue);">
          View Results →
        </button>
      </div>`);

  } catch (e) {
    showTyping();
    await new Promise(r => setTimeout(r, 400));
    hideTyping();
    await addMessage('claude', `<div style="color:var(--nogo)">⚠ Something went wrong: ${escHtml(e.message)}</div><div style="margin-top:8px;font-size:13px;color:var(--text2)">Make sure the backend is running and try again.</div>`);
    document.getElementById('run-btn') && (document.getElementById('run-btn').disabled = false);
  }
}

// ── INIT ──
async function init() {
  renderProgress();
  inputArea.style.display = 'block';
  chatInput.disabled = true;
  sendBtn.disabled = true;

  // Welcome message
  showTyping();
  await new Promise(r => setTimeout(r, 700));
  hideTyping();

  await addMessage('claude', `<div>Hey — let's find your next business opportunity.</div><div style="margin-top:6px;color:var(--text2);font-size:13px;">I'll ask you <strong style="color:var(--text)">${QUESTIONS.length} quick questions</strong> to understand exactly what you're looking for, then generate a tailored list of high-confidence opportunities.</div>`);

  await new Promise(r => setTimeout(r, 400));
  await askQuestion(0);
}

init();
</script>
